name: Docs Test

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docs-test:
    name: Documentation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run documentation tests
        run: bash scripts/docs-test-ci.sh
